
<!DOCTYPE html>
<html>
    <head>
        <title>Product Management</title>
<link rel="stylesheet" href="../Design/Style.css">    </head>
<body>
    <div class="container">
        <form>
            <fieldset>
                <legend>Product Management Page</legend>
                <label><strong>Unit Price:</strong></label>
                <input type="number" id="unitPrice" value="1000" readonly>
                <br><br>
                <label><strong>Quantity per Day:</strong></label>
                <input type="number" id="quantity_per_day" placeholder="Enter quantity per day">
                <br><br>
                <label><strong>Total Price for 30 Days:</strong></label>
                <input type="number" id="totalPrice" value="0" readonly><br>
            </fieldset>
        </form>
    </div>
<script src="../JS/script.js"></script></body>
</html>
